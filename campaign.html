<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
NOIR ÉLAN — Campaign
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="campaign.css">

</head>

<body>

<!-- HERO -->

<section class="campaign-hero">

    <video
    autoplay
    muted
    loop
    playsinline>

        <source
        src="images/campaign-video.mp4"
        type="video/mp4">

    </video>

    <div class="overlay"></div>

    <div class="campaign-content reveal">

        <p>
            NOIR ÉLAN CAMPAIGN 2026
        </p>

        <h1>

            Silhouettes <br>
            In Motion

        </h1>

    </div>

</section>

<!-- STORY -->

<section class="story">

    <div class="story-left reveal">

        <p>
            THE FILM
        </p>

        <h2>

            Movement <br>
            Defines Presence

        </h2>

    </div>

    <div class="story-right reveal">

        <span>

            A cinematic exploration of
            monochrome tailoring,
            architectural silhouettes,
            and emotional luxury.

            Every frame reflects
            restraint, identity,
            and timeless elegance.

        </span>

    </div>

</section>

<!-- GALLERY -->

<section class="gallery reveal">

    <img src="images/gallery1.jpg">

    <img src="images/gallery2.jpg">

    <img src="images/gallery3.jpg">

</section>

<script src="script.js"></script>
    
</body>
